name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: write

env:
  GO_VERSION: "1.26"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          skip-cache: false
          args: --timeout=5m
      - run: go vet ./...
      - run: go build ./...

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - run: go test ./... -v -count=1

  cross-build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          ext=""
          [ "$GOOS" = "windows" ] && ext=".exe"
          name="autoxmate-$GOOS-$GOARCH$ext"
          go build -o "$name" -ldflags="-s -w" .
          echo "binary=$name" >> $GITHUB_ENV
          echo "built=$name" >> $GITHUB_ENV
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: autoxmate-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ env.built }}

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [lint, test, cross-build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: autoxmate-*
          merge-multiple: true
      - name: Generate checksums
        run: sha256sum autoxmate-* > checksums.txt
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            autoxmate-*
            checksums.txt
          generate_release_notes: true
