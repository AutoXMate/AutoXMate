# This file controls golangci-lint behavior.
# https://golangci-lint.run/usage/configuration/

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - typecheck
    - unused
    - misspell
    - gofmt
    - goimports
    - goconst
    - gocritic
    - revive

linters-settings:
  gofmt:
    simplify: true
  goimports:
    local-prefixes: github.com/Intro-Shlok/AutoXMate
  errcheck:
    check-type-assertions: true
    check-blank: true
  govet:
    enable-all: true
  misspell:
    locale: US
  goconst:
    min-len: 3
    min-occurrences: 4
  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
  include:
    - EXC0011  # annonate with //nolint
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - goconst
    - path: "masscan/"
      linters:
        - all

run:
  timeout: 5m
  skip-dirs:
    - masscan/
    - .github/
